{% extends "base.html" %}
{% block title %}Sign up, Vintage{% endblock %}
{% block content %}
<div class="container">
  <div class="card form-card">
    <div class="hero-eyebrow">New here</div>
    <h2>Create your account</h2>
    <p style="color:var(--text-soft); font-size:14px;">Free. You'll start with $100,000 to trade with, no card needed.</p>
    <form method="POST">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required minlength="6">
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:22px;">Create account</button>
    </form>
    <p style="margin-top:18px; font-size:14px; color:var(--text-soft);">Already have one? <a href="{{ url_for('auth.login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
