{% extends "base.html" %}
{% block title %}Log in, Vintage{% endblock %}
{% block content %}
<div class="container">
  <div class="card form-card">
    <div class="hero-eyebrow">Welcome back</div>
    <h2>Log in</h2>
    <form method="POST">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:22px;">Log in</button>
    </form>
    <p style="margin-top:18px; font-size:14px; color:var(--text-soft);">No account yet? <a href="{{ url_for('auth.signup') }}">Sign up</a></p>
  </div>
</div>
{% endblock %}
